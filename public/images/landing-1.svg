<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8d7a6"/>
      <stop offset="1" stop-color="#7bb7ff"/>
    </linearGradient>
    <filter id="n" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.35"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="600" height="900" fill="url(#g)"/>
  <rect width="600" height="900" filter="url(#n)" opacity="0.5"/>
  <circle cx="460" cy="220" r="180" fill="#ffffff" opacity="0.18"/>
  <circle cx="140" cy="660" r="240" fill="#000000" opacity="0.12"/>
</svg>
